name: CI

on:
  push:
    branches: [master, feature/**, feat/**]
  pull_request:
    branches: [master]

jobs:
  typecheck-and-test:
    name: TypeScript + Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: copilot
          POSTGRES_PASSWORD: copilot_dev
          POSTGRES_DB: copilot_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Apply DB schema
        run: |
          psql "postgresql://copilot:copilot_dev@localhost:5432/copilot_db" -f docker/init.sql
        env:
          PGPASSWORD: copilot_dev

      - name: TypeScript type check
        run: npm run typecheck

      - name: Run tests
        run: npm run test:run
        env:
          NODE_ENV: test
          PORT: 3000
          DATABASE_URL: postgresql://copilot:copilot_dev@localhost:5432/copilot_db
          REDIS_URL: redis://localhost:6379
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          AWS_REGION: us-east-1
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
          ALLOWED_ORIGIN: http://localhost:4200
