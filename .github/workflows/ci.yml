name: CI

on:
  push:
    branches: [master, feature/**, feat/**]
  pull_request:
    branches: [master]

jobs:
  typecheck-and-test:
    name: TypeScript + Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: copilot
          POSTGRES_PASSWORD: ${{ secrets.CI_POSTGRES_PASSWORD }}
          POSTGRES_DB: copilot_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Apply DB schema
        run: |
          psql "postgresql://copilot:${{ secrets.CI_POSTGRES_PASSWORD }}@localhost:5432/copilot_db" -f docker/init.sql
        env:
          PGPASSWORD: ${{ secrets.CI_POSTGRES_PASSWORD }}

      - name: Run integration tests
        run: npm run test:integration
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://copilot:${{ secrets.CI_POSTGRES_PASSWORD }}@localhost:5432/copilot_db
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: ci-test-jwt-secret-that-is-at-least-32-characters-long
          JWT_REFRESH_SECRET: ci-test-refresh-secret-that-is-at-least-32-chars
          PORT: 3000
          ANTHROPIC_API_KEY: sk-ant-ci-placeholder-not-real-for-unit-tests-only-xxxxxx
          AWS_REGION: us-east-1
          AWS_ACCESS_KEY_ID: AKIAIOSFODNN7EXAMPLE
          AWS_SECRET_ACCESS_KEY: wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY
          ALLOWED_ORIGIN: http://localhost:4200

      - name: TypeScript type check
        run: npm run typecheck

      - name: Run tests
        run: npm run test:run
        env:
          NODE_ENV: test
          PORT: 3000
          DATABASE_URL: postgresql://copilot:${{ secrets.CI_POSTGRES_PASSWORD }}@localhost:5432/copilot_db
          REDIS_URL: redis://localhost:6379
          # Dummy values — unit tests mock all external clients; nothing real is called
          ANTHROPIC_API_KEY: sk-ant-ci-placeholder-not-real-for-unit-tests-only-xxxxxx
          AWS_REGION: us-east-1
          AWS_ACCESS_KEY_ID: AKIAIOSFODNN7EXAMPLE
          AWS_SECRET_ACCESS_KEY: wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY
          JWT_SECRET: ci-test-jwt-secret-that-is-at-least-32-characters-long
          JWT_REFRESH_SECRET: ci-test-refresh-secret-that-is-at-least-32-chars
          ALLOWED_ORIGIN: http://localhost:4200
