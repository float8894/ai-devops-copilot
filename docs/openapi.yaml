openapi: 3.1.0
info:
  title: AI DevOps Copilot API
  version: 1.0.0
  description: |
    Conversational AI backend for infrastructure monitoring. Engineers ask plain-English
    questions about failed jobs, Redis cache health, and AWS costs. The server routes
    questions through Claude (Anthropic API) with an agentic tool-use loop backed by
    PostgreSQL, Redis, and AWS Cost Explorer.

    ## Rate Limits

    | Endpoint group | Production | Development |
    |---------------|-----------|-------------|
    | `/api/chat`   | 20 req / 15 min | 100 req / 15 min |
    | All others    | 100 req / 15 min | 500 req / 15 min |

    Rate limit state is returned in `RateLimit-*` response headers.

  contact:
    name: AI DevOps Copilot
  license:
    name: MIT

servers:
  - url: http://localhost:3000
    description: Local development server
  - url: https://api.your-domain.com
    description: Production server

tags:
  - name: Health
    description: Liveness and readiness probes
  - name: Chat
    description: Conversational AI queries powered by Claude with tool use

# ---------------------------------------------------------------------------
# Components
# ---------------------------------------------------------------------------
components:
  # ---------------------------------------------------------------------------
  # Shared schemas
  # ---------------------------------------------------------------------------
  schemas:
    # ---- Errors ---------------------------------------------------------------
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              example: RATE_LIMIT_EXCEEDED
            message:
              type: string
              example: Invalid or expired access token
            requestId:
              type: string
              format: uuid
              description: Unique request identifier for log correlation
              example: 6b47322e-510b-427b-9745-f37aa7be1f9b

    ValidationErrorResponse:
      allOf:
        - $ref: '#/components/schemas/ErrorResponse'
      example:
        error:
          code: VALIDATION_ERROR
          message: Invalid request data
          requestId: abc123

    # ---- Chat -----------------------------------------------------------------
    ChatRequest:
      type: object
      required: [message]
      properties:
        message:
          type: string
          minLength: 1
          maxLength: 2000
          description: |
            Natural-language question about your infrastructure. Examples:
            - "How many failed jobs in the last 24h?"
            - "Why did AWS costs spike on Tuesday?"
            - "Is the Redis cache healthy?"
          example: How many failed jobs in the last 24 hours?
        conversationId:
          type: string
          format: uuid
          description: |
            Omit to start a new conversation. Include to continue a previous one
            (unrecognized IDs silently create a new conversation). Claude will have
            access to the full message history.
          example: 7a52d211-d4a5-4be4-97f5-c231cfe81aae

    ChatResponse:
      type: object
      required: [reply, toolsUsed, conversationId]
      properties:
        reply:
          type: string
          description: |
            Claude's natural-language answer. Includes specific data from the tools
            called (counts, percentages, dollar amounts). Never a guess — Claude
            always queries the relevant tool first.
          example: |
            In the last 24 hours, there have been **4 failed jobs**:

            1. **send-invoice-emails** — SMTP connection refused (10.0.0.5:587)
            2. **sync-stripe-webhooks** — Stripe API rate limit exceeded (429)
            3. **generate-pdf-reports** — Out of memory: Killed process 1842
            4. **backup-user-data** — S3 PutObject: Access Denied (403)

            Each failure is a distinct issue requiring individual attention.
        toolsUsed:
          type: array
          items:
            type: string
            enum: [query_failed_jobs, get_redis_stats, get_aws_costs]
          description: Names of the tools Claude invoked to answer this question
          example: [query_failed_jobs]
        conversationId:
          type: string
          format: uuid
          description: Pass this in subsequent requests to continue the conversation
          example: 7a52d211-d4a5-4be4-97f5-c231cfe81aae

    # ---- SSE events -----------------------------------------------------------
    SseToolStartEvent:
      type: object
      description: Emitted when Claude begins calling a tool
      required: [type, tool]
      properties:
        type:
          type: string
          enum: [tool_start]
        tool:
          type: string
          enum: [query_failed_jobs, get_redis_stats, get_aws_costs]
          example: query_failed_jobs

    SseToolDoneEvent:
      type: object
      description: Emitted when a tool call completes
      required: [type, tool]
      properties:
        type:
          type: string
          enum: [tool_done]
        tool:
          type: string
          example: query_failed_jobs

    SseTextDeltaEvent:
      type: object
      description: Emitted for each text chunk of Claude's final answer
      required: [type, delta]
      properties:
        type:
          type: string
          enum: [text_delta]
        delta:
          type: string
          description: Partial text to append to the current answer buffer
          example: 'In the last 24 hours'

    SseDoneEvent:
      type: object
      description: Final event — conversation complete
      required: [type, conversationId, toolsUsed]
      properties:
        type:
          type: string
          enum: [done]
        conversationId:
          type: string
          format: uuid
          example: 7a52d211-d4a5-4be4-97f5-c231cfe81aae
        toolsUsed:
          type: array
          items:
            type: string
          example: [query_failed_jobs]

    # ---- Health ---------------------------------------------------------------
    HealthResponse:
      type: object
      required: [status, timestamp]
      properties:
        status:
          type: string
          enum: [ok]
          example: ok
        timestamp:
          type: string
          format: date-time
          example: '2026-04-16T12:00:00.000Z'

# ---------------------------------------------------------------------------
# Paths
# ---------------------------------------------------------------------------
paths:
  # ── Health ────────────────────────────────────────────────────────────────
  /health:
    get:
      tags: [Health]
      summary: Liveness check
      description: |
        Returns `{"status":"ok"}`. No authentication required. Not rate-limited.
        Use for container/load-balancer health probes.
      operationId: getHealth
      responses:
        '200':
          description: Server is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              example:
                status: ok
                timestamp: '2026-04-16T12:00:00.000Z'

  # ── Chat ──────────────────────────────────────────────────────────────────
  /api/chat:
    post:
      tags: [Chat]
      summary: Send a message and get a complete AI response
      description: |
        Sends a natural-language question to Claude. The server:

        1. Loads conversation history from PostgreSQL (if `conversationId` provided — unrecognized IDs silently start a new conversation)
        2. Runs the **agentic tool loop**:
           - Claude decides which tools to call (`query_failed_jobs`, `get_redis_stats`, `get_aws_costs`)
           - All tools in a single turn are executed **in parallel** via `Promise.all`
           - Loop continues until `stop_reason = "end_turn"`
        3. Saves the exchange to PostgreSQL
        4. Returns the complete answer

        **Available tools Claude can invoke:**
        | Tool | Data source | Asks about |
        |------|------------|-----------|
        | `query_failed_jobs` | PostgreSQL `jobs` table | Failed jobs, task errors, job queue |
        | `get_redis_stats` | Redis `INFO` command | Cache hit rate, memory, connected clients |
        | `get_aws_costs` | AWS Cost Explorer API | Cloud spend, cost spikes, billing by service |

        **Rate limit:** 20 requests / 15 minutes per IP in production.
      operationId: chat
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatRequest'
            examples:
              new_conversation:
                summary: Start a new conversation
                value:
                  message: How many failed jobs in the last 24 hours?
              continue_conversation:
                summary: Continue an existing conversation
                value:
                  message: Can you check the Redis cache health too?
                  conversationId: 7a52d211-d4a5-4be4-97f5-c231cfe81aae
      responses:
        '200':
          description: AI response with tool results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatResponse'
              example:
                reply: |
                  In the last 24 hours, there have been **4 failed jobs**:

                  1. **send-invoice-emails** — SMTP connection refused (10.0.0.5:587) at 10:24 AM
                  2. **sync-stripe-webhooks** — Stripe API rate limit exceeded (429) at 7:24 AM
                  3. **generate-pdf-reports** — Out of memory: Killed process 1842 at 4:24 AM
                  4. **backup-user-data** — S3 PutObject: Access Denied (403) at 12:24 AM
                toolsUsed:
                  - query_failed_jobs
                conversationId: 7a52d211-d4a5-4be4-97f5-c231cfe81aae
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/chat/stream:
    post:
      tags: [Chat]
      summary: Send a message and receive a streaming SSE response
      description: |
        Same as `POST /api/chat` but delivers the response incrementally via
        **Server-Sent Events (SSE)**. The connection stays open until Claude's
        answer is fully generated.

        **Response format:** `Content-Type: text/event-stream`

        Each SSE event has the format:
        ```
        event: <event_type>
        data: <json_payload>

        ```

        **Event sequence:**
        ```
        event: tool_start
        data: {"type":"tool_start","tool":"query_failed_jobs"}

        event: tool_done
        data: {"type":"tool_done","tool":"query_failed_jobs"}

        event: text_delta
        data: {"type":"text_delta","delta":"In the last 24"}

        event: text_delta
        data: {"type":"text_delta","delta":" hours, there were"}

        ... (more deltas)

        event: done
        data: {"type":"done","conversationId":"7a52d...","toolsUsed":["query_failed_jobs"]}
        ```

        Tool calls are executed as a batch (non-streamed) before streaming begins.
        Text streaming starts only on the final Claude response turn.

        **Rate limit:** 20 requests / 15 minutes per IP in production.
      operationId: chatStream
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatRequest'
            example:
              message: How many failed jobs in the last 24 hours?
      responses:
        '200':
          description: SSE stream of events
          content:
            text/event-stream:
              schema:
                type: string
                description: |
                  Server-Sent Events stream. Each event is one of:
                  - `tool_start` — Claude started calling a tool
                  - `tool_done` — Tool call completed
                  - `text_delta` — Partial text chunk of the answer
                  - `done` — Final event with conversationId and toolsUsed
              example: |
                event: tool_start
                data: {"type":"tool_start","tool":"query_failed_jobs"}

                event: tool_done
                data: {"type":"tool_done","tool":"query_failed_jobs"}

                event: text_delta
                data: {"type":"text_delta","delta":"In the last 24 hours"}

                event: done
                data: {"type":"done","conversationId":"7a52d211-d4a5-4be4-97f5-c231cfe81aae","toolsUsed":["query_failed_jobs"]}
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
